<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
    </style>
</head>
<body>
    <style>
        #back{
            position:fixed;
            top:0px;
            left:0px;
            z-index:-10;
            height:100%;
        }
        body {
            display:flex;
            justify-content:center;
        }
        #content {
            position:relative;
            max-width:1200px;
            width:100vw;
        }
        .firstPres{
            display:block;
            width:100%;
            position:absolute;
        }
    </style>
    <img id="back" src="images/christus.webp">
    <div id="content"></div>
    <script>
        function curve(x){
            if(x < -1){
                x = -1;
            }
            if(x > 1){
                x = 1;
            }
            return (Math.pow(x*x*x*x-2*x*x+1,3));
        }
        const offset = 40;

        const content = document.getElementById("content");
        const ap = [
            "anderson.webp",
            "bednar.webp",
            "causse.webp",
            "cook.webp",
            "gilbert.webp",
            "gong.webp",
            "kearon.webp",
            "rasband.webp",
            "renlund.webp",
            "soares.webp",
            "stevenson.webp",
            "uchtdorf.webp"
        ];
        const fp = [
            "oaks.webp",
            "eyring.webp",
            "christofferson.webp",
        ];
        const el = [];
        
        for(let i = 0; i < fp.length; i++){
            const temp = document.createElement("img");
            temp.src = "images/"+fp[i];
            temp.className = "firstPres";
            temp.style.top = offset*i+"vh";
            el.push(
                {
                    img:content.appendChild(temp),
                }
            );
        }
        for(let i = 0; i < ap.length; i++){
            const temp = document.createElement("img");
            temp.src = "images/"+ap[i];
            temp.className = "firstPres";
            temp.style.top = offset*(i+3)+"vh";
            el.push(
                {
                    img:content.appendChild(temp),
                }
            );
        }
        function onScroll(e){
                let H = window.innerHeight;
                if(el.length === 0){return;}
                for(let i = 0; i < el.length; i++){
                    el[i].box = el[i].img.getBoundingClientRect();
                    let scProg = (el[i].box.y+el[i].box.height/2)/H*2-1;
                    if(scProg > 1){scProg = 1;}
                    if(scProg < -1){scProg = 0;}
                    let nSize = curve(scProg)*0.5+0.5;
                    el[i].img.style.transform = `translateZ(${-10}px) scale(${nSize},${nSize})`;
                    if(i === 1){
                        console.log(scProg);
                    }
                }
        }

        document.addEventListener("scroll",onScroll);
    </script>
</body>
</html>
